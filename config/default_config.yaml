# Pipeline Configuration
pipeline:
  project_name: "my-anime"
  output_dir: "./output"
  gcs_bucket: "my-anime-pipeline"  # Optional: Google Cloud Storage bucket
  resume_enabled: true
  state_file: "pipeline_state.json"

# Google Cloud — User has Google AI Ultra subscription (highest tier)
gcp:
  project_id: "${GCP_PROJECT_ID}"
  region: "us-central1"
  ultra_tier: true                       # Enables highest rate limits and model access
  # Model version policy: "latest" = auto-resolve at runtime, or pin a specific version
  gemini_model_decompose: "latest"       # Resolves to gemini-3.1-pro or newest available
  gemini_model_qa: "latest-flash"        # Resolves to gemini-3-flash or newest available
  gemini_model_deep_think: "latest-pro"  # For complex narrative reasoning
  imagen_model: "latest"                 # Resolves to imagen-4 or newest available
  veo_model: "latest"                    # Resolves to veo-3.1-generate-preview or newest
  nano_banana_model: "latest"            # Resolves to gemini-2.5-flash-image or newest
  # Fallback versions (used if auto-resolve fails)
  fallback_models:
    gemini_pro: "gemini-3.1-pro-preview"
    gemini_flash: "gemini-3-flash-preview"  
    imagen: "imagen-3.0-generate-001"
    veo: "veo-3.1-generate-preview"

# Episode defaults
episode:
  target_duration_minutes: 20
  target_shot_count: 120
  default_shot_duration: 5  # seconds
  fps: 24
  resolution: "1080p"  # 720p, 1080p, 4k
  aspect_ratio: "16:9"

# Style — matches "Felix - Official Teaser" visual language
style:
  guide: "Dark painterly anime style. Heavy ink-like outlines with variable weight. Muted earth-tone palette — deep browns, weathered bronze, burgundy reds, dusty ochre. Dramatic chiaroscuro lighting with warm torch/candle glows against deep shadows. Textured brush strokes visible in backgrounds, cel-shaded characters with soft gradient shading. Cinematic composition, moody atmosphere, rain and particle effects. Gritty realism within anime proportions. Inspired by Vinland Saga, Berserk (1997), and Mushishi. NO bright saturated colors, NO clean modern aesthetics."
  setting: "Roman Republic, 1st century BC. Mediterranean stone architecture — arches, columns, cobblestone streets, dusty roads. Characters wear togas, leather armor (lorica), sandals. Olive groves, temple ruins, torchlit interiors. Ancient world — no modern elements whatsoever."
  negative_prompt: "photorealistic, 3D render, western cartoon, blurry, low quality, modern architecture, neon colors, bright saturated colors, clean lines, flat shading, dismembered, severed limbs, floating heads, detached body parts, anatomical errors, deformed anatomy, extra limbs, missing limbs, CGI, plastic looking, smooth digital art, generic AI art, stock photo, watermark"

# Generation settings
generation:
  keyframe:
    provider: "fal"  # "vertex" (Gemini image output) or "fal" (fal.ai)
    fal_model: "fal-ai/google/nano-banana-2"  # Default: Nano Banana 2. Alt: "fal-ai/flux-pro/v1.1"
    batch_size: 10
    retry_count: 3
  video:
    provider: "hailuo"  # "hailuo" (Hailuo 2.3 Pro on fal.ai) or "veo" (Veo 2 on fal.ai)
    hailuo_model: "fal-ai/minimax/hailuo-2.3/pro/image-to-video"
    use_scene_extension: true
    use_reference_images: true
    max_reference_images: 3
    default_duration: "6"  # seconds (Hailuo 2.3: 6s or 10s)
    batch_size: 5
    retry_count: 3
  rate_limits:
    veo_requests_per_minute: 15
    imagen_requests_per_minute: 30
    gemini_requests_per_minute: 60

# Assembly
assembly:
  use_transitions: true
  crossfade_seconds: 0.5  # Crossfade duration at scene boundaries

# Audio
audio:
  voice_provider: "elevenlabs"  # "elevenlabs" or "google_tts"
  elevenlabs_api_key: "${ELEVENLABS_API_KEY}"
  music_provider: "lyria"       # "lyria" (Google Lyria 3, Ultra tier) or "suno" or "manual"
  music_track: null              # Path to manual background music file, or null to auto-generate
  dialogue_volume: 1.0
  music_volume: 0.3

# Quality
quality:
  auto_review: true
  qa_threshold: 0.6  # Minimum score to auto-approve
  human_review_threshold: 0.8  # Below this, flag for human review
  max_regeneration_attempts: 3

# Hailuo 2.3 (primary video provider via fal.ai)
hailuo:
  enabled: true
  model: "hailuo-2.3"
  resolution: "1080P"
  use_for_tags: ["action", "fight", "dance", "highly_stylized", "anime"]
